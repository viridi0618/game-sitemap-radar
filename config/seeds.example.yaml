sources:
  - name: Example Game Site
    domain: example.com
    sitemap_url: https://example.com/sitemap.xml
    site_type: general
    language: en
    priority: 3
    include_url_keywords:
      - roblox
      - codes
      - wiki
      - guide
      - tier-list
      - best
      - how-to
      - values
      - calculator
    exclude_url_keywords:
      - review
      - hardware
      - movie
      - tv
      - deals

  - name: Example Roblox Codes Site
    domain: example-codes.com
    sitemap_url:
    site_type: codes
    language: en
    priority: 4

settings:
  request_timeout_seconds: 20
  max_sitemaps_per_source: 50
  max_urls_per_sitemap: 50000
  delay_seconds_per_source: 1
  user_agent: "GameSitemapRadar/0.1 (+keyword research; respects robots.txt)"
  report_window_hours: 72

writing:
  default_language: en
  min_candidate_score_for_writing: 60
  max_pages_per_candidate: 8
  require_manual_research_before_final_export: true
  draft_status: draft_needs_review
  include_source_placeholders: true
  avoid_overclaim_words:
    - complete
    - verified
    - guaranteed
    - all
    - every
    - official
  page_type_priority:
    codes: 90
    wiki: 85
    homepage: 82
    beginner_guide: 80
    guide: 75
    tier_list: 75
    how_to: 70
    values: 65
    calculator: 60
    items: 55
    traits: 55
    mutations: 55
    faq: 50
    map: 50
    boss: 50
    update: 40
    release: 35
    news: 25
